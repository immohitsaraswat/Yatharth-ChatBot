<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <!-- Left: Text group -->
  <!-- YATHARTH -->
  <text x="0" y="72" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#1a5276" letter-spacing="2">YATHARTH</text>
  <!-- SUPER SPECIALITY HOSPITALS -->
  <text x="2" y="102" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#117a8b" letter-spacing="3">SUPER SPECIALITY HOSPITALS</text>
  <!-- GET BETTER -->
  <text x="2" y="132" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#e67e22" letter-spacing="3">GET BETTER</text>

  <!-- Right: Icon group (person in circle arc) -->
  <!-- Partial circle arc - light blue teal -->
  <path d="M430 20 A90 90 0 1 1 520 110" stroke="#2e9ec4" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Person figure body / Y shape in gold/orange -->
  <!-- Left arm raised -->
  <path d="M445 115 Q430 85 438 60" stroke="#e67e22" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Right arm raised -->
  <path d="M475 115 Q490 85 482 60" stroke="#e67e22" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Body/legs in golden brown -->
  <path d="M445 115 Q460 120 475 115 L468 148 Q460 152 452 148 Z" fill="#b8860b"/>
  <line x1="460" y1="115" x2="460" y2="150" stroke="#b8860b" stroke-width="13" stroke-linecap="round"/>

  <!-- Medical cross circle (head) -->
  <circle cx="460" cy="52" r="18" fill="white" stroke="#1a5276" stroke-width="3"/>
  <rect x="454" y="44" width="12" height="16" rx="2" fill="none" stroke="#1a5276" stroke-width="3"/>
  <!-- Cross lines inside circle -->
  <line x1="460" y1="40" x2="460" y2="64" stroke="#1a5276" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="448" y1="52" x2="472" y2="52" stroke="#1a5276" stroke-width="3.5" stroke-linecap="round"/>
</svg>
